name: Pre-Market Tasks

# 09:15 IST = 03:45 UTC, Mon–Fri
on:
  schedule:
    - cron: "45 3 * * 1-5"
  workflow_dispatch:

jobs:
  premarket:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      FYERS_CLIENT_ID:     ${{ secrets.FYERS_CLIENT_ID }}
      FYERS_SECRET_KEY:    ${{ secrets.FYERS_SECRET_KEY }}
      FYERS_REDIRECT_URI:  ${{ secrets.FYERS_REDIRECT_URI }}
      FYERS_FY_ID:         ${{ secrets.FYERS_FY_ID }}
      FYERS_PIN:           ${{ secrets.FYERS_PIN }}
      FYERS_TOTP_SECRET:   ${{ secrets.FYERS_TOTP_SECRET }}
      SMTP_HOST:           ${{ secrets.SMTP_HOST }}
      SMTP_PORT:           ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME:       ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
      EMAIL_RECIPIENT:     ${{ secrets.EMAIL_RECIPIENT }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Refresh Fyers token (headless TOTP)
        run: python -m tools.fyers_auto_login
      - name: Generate & send pre-market checklist
        run: python -m jobs.run_premarket
