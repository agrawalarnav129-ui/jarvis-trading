name: Pre-Market Tasks

# Target 09:15 IST = 03:45 UTC, Mon–Fri (GitHub cron is a best-effort fallback).
on:
  schedule:
    - cron: "47 3 * * 1-5"
  workflow_dispatch:
  repository_dispatch:
    types: [pre-market]

jobs:
  premarket:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate & send pre-market checklist
        run: python -m jobs.run_premarket
