name: OHLCV Cache (Builder scanner)

# Dump 2 years of daily OHLCV for the scan universe once per evening so the
# condition Builder scan + backtest read from cache (instant) instead of
# fetching yfinance live. yfinance works from GitHub runners.
on:
  schedule:
    - cron: "0 12 * * 1-5"   # ~17:30 IST, after market close
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ohlcv:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install requests python-dotenv loguru pandas yfinance
      - name: Build OHLCV cache
        run: python -m jobs.run_ohlcv_cache
      - name: Commit OHLCV cache
        run: |
          git config user.name  "jarvis-bot"
          git config user.email "jarvis-bot@users.noreply.github.com"
          git add -f data/ohlcv_cache.json.gz 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: ohlcv cache [skip ci]"
            git push
          else
            echo "OHLCV cache unchanged."
          fi
