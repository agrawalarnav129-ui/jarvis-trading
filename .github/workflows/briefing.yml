name: Morning Briefing

# 08:30 IST = 03:00 UTC, Mon–Fri
on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write           # allow committing the refreshed watchlist

jobs:
  briefing:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      FYERS_CLIENT_ID:     ${{ secrets.FYERS_CLIENT_ID }}
      FYERS_SECRET_KEY:    ${{ secrets.FYERS_SECRET_KEY }}
      FYERS_REDIRECT_URI:  ${{ secrets.FYERS_REDIRECT_URI }}
      FYERS_FY_ID:         ${{ secrets.FYERS_FY_ID }}
      FYERS_PIN:           ${{ secrets.FYERS_PIN }}
      FYERS_TOTP_SECRET:   ${{ secrets.FYERS_TOTP_SECRET }}
      SMTP_HOST:           ${{ secrets.SMTP_HOST }}
      SMTP_PORT:           ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME:       ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
      EMAIL_RECIPIENT:     ${{ secrets.EMAIL_RECIPIENT }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Heartbeat (always fires first)
        if: always()
        run: python -m jobs.run_heartbeat

      - name: Refresh Fyers token (headless TOTP)
        run: python -m tools.fyers_auto_login

      - name: Generate & send morning briefing
        run: python -m jobs.run_briefing

      - name: Commit refreshed watchlist
        run: |
          git config user.name  "jarvis-bot"
          git config user.email "jarvis-bot@users.noreply.github.com"
          git add data/watchlist.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh watchlist [skip ci]"
            git push
          else
            echo "Watchlist unchanged."
          fi
