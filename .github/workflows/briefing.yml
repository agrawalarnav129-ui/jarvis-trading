name: Morning Briefing

# Target 08:30 IST = 03:00 UTC, Mon–Fri.
# NOTE: GitHub's scheduled cron is best-effort and often runs 1–5h late at busy
# times. For on-time delivery, trigger via repository_dispatch from a reliable
# external cron (e.g. cron-job.org) — see DEPLOY.md. The cron below is a fallback.
on:
  schedule:
    - cron: "3 3 * * 1-5"     # off the top-of-hour to reduce queue delay
  workflow_dispatch:          # manual "Run workflow" button
  repository_dispatch:
    types: [morning-briefing] # external on-time trigger

permissions:
  contents: write           # allow committing the refreshed watchlist

jobs:
  briefing:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      FYERS_CLIENT_ID:     ${{ secrets.FYERS_CLIENT_ID }}
      FYERS_SECRET_KEY:    ${{ secrets.FYERS_SECRET_KEY }}
      FYERS_REDIRECT_URI:  ${{ secrets.FYERS_REDIRECT_URI }}
      FYERS_FY_ID:         ${{ secrets.FYERS_FY_ID }}
      FYERS_PIN:           ${{ secrets.FYERS_PIN }}
      FYERS_TOTP_SECRET:   ${{ secrets.FYERS_TOTP_SECRET }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Heartbeat (always fires first)
        if: always()
        run: python -m jobs.run_heartbeat

      - name: Refresh Fyers token (headless TOTP)
        run: python -m tools.fyers_auto_login

      - name: Generate & send morning briefing
        run: python -m jobs.run_briefing

      - name: Commit refreshed watchlist
        run: |
          git config user.name  "jarvis-bot"
          git config user.email "jarvis-bot@users.noreply.github.com"
          git add data/watchlist.csv 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh watchlist [skip ci]"
            git push
          else
            echo "Watchlist unchanged."
          fi
