name: Post-Market Summary

# Target 15:35 IST = 10:05 UTC, Mon–Fri (GitHub cron is a best-effort fallback).
on:
  schedule:
    - cron: "7 10 * * 1-5"
  workflow_dispatch:
  repository_dispatch:
    types: [post-market]

jobs:
  postmarket:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate & send post-market checklist
        run: python -m jobs.run_postmarket
