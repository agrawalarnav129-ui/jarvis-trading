name: Preflight Check

# Run manually from the Actions tab to verify Secrets + connectivity
on:
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Kolkata
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      FYERS_CLIENT_ID:     ${{ secrets.FYERS_CLIENT_ID }}
      FYERS_SECRET_KEY:    ${{ secrets.FYERS_SECRET_KEY }}
      FYERS_REDIRECT_URI:  ${{ secrets.FYERS_REDIRECT_URI }}
      FYERS_FY_ID:         ${{ secrets.FYERS_FY_ID }}
      FYERS_PIN:           ${{ secrets.FYERS_PIN }}
      FYERS_TOTP_SECRET:   ${{ secrets.FYERS_TOTP_SECRET }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run preflight readiness check
        run: python -m tools.preflight
